  <script>
    // =========================================================================
    // Glossary Rendering & Filtering
    // =========================================================================

    (function () {
      const searchInput = document.getElementById('db-search');
      const filterSelect = document.getElementById('db-filter');
      const countDisplay = document.getElementById('db-count');
      const glossaryList = document.getElementById('glossary-list');

      // Category → tag color mapping
      const CATEGORY_COLORS = {
        '전자부품': 'blue',
        '구동계': 'green',
        '섀시': 'orange',
        '배터리': 'red',
        '조종': 'purple',
        '튜닝': 'pink',
        'Traxxas': 'red',
        '일반': 'gray'
      };

      // Sort data alphabetically by term
      function sortedData() {
        return [...GLOSSARY_DATA].sort(function (a, b) {
          return a.term.localeCompare(b.term, 'ko');
        });
      }

      // Render glossary items
      function render() {
        var searchValue = searchInput.value.trim().toLowerCase();
        var filterValue = filterSelect.value;

        var data = sortedData();

        // Filter
        var filtered = data.filter(function (item) {
          // Category filter
          if (filterValue !== 'all' && item.category !== filterValue) {
            return false;
          }
          // Search filter
          if (searchValue) {
            var haystack = (
              item.term + ' ' +
              item.termKo + ' ' +
              item.definition
            ).toLowerCase();
            return haystack.indexOf(searchValue) !== -1;
          }
          return true;
        });

        // Update count
        countDisplay.textContent = '총 ' + filtered.length + '개 용어';

        // Build HTML
        if (filtered.length === 0) {
          glossaryList.innerHTML = '<p class="text-muted" style="text-align:center;padding:2rem 0;">검색 결과가 없습니다.</p>';
          return;
        }

        var html = '';
        filtered.forEach(function (item) {
          var color = CATEGORY_COLORS[item.category] || 'gray';

          html += '<div class="toggle">';
          html += '  <button class="toggle-header">';
          html += '    <span class="toggle-arrow">▶</span>';
          html += '    <strong>' + escapeHtml(item.term) + '</strong> ';
          html += '    <span class="tag tag-' + color + '">' + escapeHtml(item.category) + '</span>';
          html += '  </button>';
          html += '  <div class="toggle-body">';
          html += '    <div class="toggle-body-inner">';
          html += '      <p><strong>' + escapeHtml(item.termKo) + '</strong></p>';
          html += '      <p>' + escapeHtml(item.definition) + '</p>';
          if (item.example) {
            html += '      <p class="text-muted">예시: ' + escapeHtml(item.example) + '</p>';
          }
          if (item.related && item.related.length > 0) {
            html += '      <p class="text-muted">관련 용어: ' + item.related.map(escapeHtml).join(', ') + '</p>';
          }
          html += '    </div>';
          html += '  </div>';
          html += '</div>';
        });

        glossaryList.innerHTML = html;

        // Attach toggle listeners
        bindToggles();
      }

      // Toggle accordion behavior
      function bindToggles() {
        var headers = glossaryList.querySelectorAll('.toggle-header');
        headers.forEach(function (header) {
          header.addEventListener('click', function () {
            var toggle = this.parentElement;
            var arrow = this.querySelector('.toggle-arrow');
            var body = toggle.querySelector('.toggle-body');

            var isOpen = toggle.classList.contains('open');

            if (isOpen) {
              toggle.classList.remove('open');
              arrow.textContent = '▶';
              body.style.maxHeight = null;
            } else {
              toggle.classList.add('open');
              arrow.textContent = '▼';
              body.style.maxHeight = body.scrollHeight + 'px';
            }
          });
        });
      }

      // HTML escape helper
      function escapeHtml(text) {
        if (!text) return '';
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
      }

      // Event listeners
      searchInput.addEventListener('input', render);
      filterSelect.addEventListener('change', render);

      // Initial render
      render();
    })();
  </script>
